syntax = "proto3";

package dcn;

import "execute.proto";

message TransformationDef
{
    string name = 1;
    repeated int32 args = 2;
}

message Dimension
{
    repeated TransformationDef transformations = 1;
    string composite = 2;
    map<string, string> bindings = 3;
}

// Public-facing minimal definition
message Connector 
{
    string name = 1;
    repeated Dimension dimensions = 2;
    string condition_name = 4;
    repeated int32 condition_args = 5;
    map<uint32, RunningInstance> static_ri = 6;
}

// Internal full record (used in storage, indexing, etc.)
message ConnectorRecord 
{
  Connector connector = 1;
  string owner = 2;
}
